on:
  pull_request:
  push:
    branches:
      - main
name: release
permissions:
  id-token: write
  contents: write
  pull-requests: write
jobs:
  release-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}

      # Format changelog, workaround for https://github.com/google-github-actions/release-please-action/issues/542
      # Taken from https://github.com/remarkablemark/release-please-extra-files-demo/blob/master/.github/workflows/release-please.yml
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ steps.release.outputs.pr }}
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          fetch-depth: 0
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}

      - name: Configure Git user
        if: ${{ steps.release.outputs.pr }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git --no-pager show --name-only

      - name: Format CHANGELOG.md
        if: ${{ steps.release.outputs.pr }}
        run: npx oxfmt CHANGELOG.md .release-please-manifest.json

      - name: Commit
        if: ${{ steps.release.outputs.pr }}
        run: |
          git add CHANGELOG.md .release-please-manifest.json
          git commit -m 'chore: Format CHANGELOG.md' --no-verify

      - name: Push changes
        if: ${{ steps.release.outputs.pr }}
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
        with:
          github_token: ${{ secrets.RELEASE_PR_TOKEN }}
          branch: ${{ fromJson(steps.release.outputs.pr).headBranchName }}

  safari-package:
    name: Safari Package
    runs-on: macos-latest
    needs: [release-pr]
    if: ${{ (github.event_name == 'pull_request' || needs.release-pr.outputs.release_created == 'true') && always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build Safari app
        run: make safari

      - name: Archive Safari app
        run: |
          cd dist/safari
          ditto -c -k --keepParent "JabRef Browser Extension.app" "JabRef Browser Extension.app.zip"

      - name: Upload Safari Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: safari-unsigned-app
          path: dist/safari/JabRef Browser Extension.app.zip

  safari-notarize:
    name: Safari Notarize
    runs-on: macos-latest
    needs: [release-pr, safari-package]
    if: ${{ github.event_name != 'pull_request' && needs.release-pr.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Download Unsigned Safari App
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v5.0.0
        with:
          name: safari-unsigned-app
          path: dist/safari

      - name: Unpack Safari App
        run: |
          cd dist/safari
          ditto -x -k "JabRef Browser Extension.app.zip" .
          rm "JabRef Browser Extension.app.zip"

      - name: Import Signing Certificate
        uses: slidoapp/import-codesign-certs@1923310662e8682dd05b76b612b53301f431cd5d
        with:
          p12-file-base64: ${{ secrets.OSX_SIGNING_CERT_APPLICATION }}
          p12-password: ${{ secrets.OSX_CERT_PWD }}
          keychain-password: ${{ secrets.OSX_CERT_PWD }}

      - name: Sign Safari App
        run: |
          chmod +x scripts/sign_safari_local.sh
          ./scripts/sign_safari_local.sh "${{ secrets.SAFARI_DEVELOPER_IDENTITY }}"

      - name: Store Notarytool Credentials
        run: |
          xcrun notarytool store-credentials "jabref-ci-notary" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_NOTARY_TEAM_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_PASSWORD }}"

      - name: Notarize Safari App
        run: |
          chmod +x scripts/notarize_safari_local.sh
          ./scripts/notarize_safari_local.sh "jabref-ci-notary"

      - name: Upload Notarized Safari App
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: safari-notarized-app
          path: |
            dist/safari/JabRef Browser Extension.app.zip
            dist/safari/jabref-browser-extension-safari.zip

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    needs: [release-pr]
    if: ${{ (github.event_name == 'pull_request' || needs.release-pr.outputs.release_created == 'true') && always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Submit to stores
        run: |
          pnpm wxt submit \
            ${{ github.event_name == 'pull_request' && '--dry-run' || '' }} \
            --firefox-zip .output/*-firefox.zip --firefox-sources-zip .output/*-sources.zip

        #--chrome-zip .output/*-chrome.zip \
        #--edge-zip .output/{your-extension}-{version}-chrome.zip
        env:
          #CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          #CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          #CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          #CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_EXTENSION_ID: "@jabfox"
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
