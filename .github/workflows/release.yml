on:
  pull_request:
  push:
    branches:
      - main
name: release
permissions:
  id-token: write
  contents: write
  pull-requests: write
jobs:
  release-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}

      # Format changelog, workaround for https://github.com/google-github-actions/release-please-action/issues/542
      # Taken from https://github.com/remarkablemark/release-please-extra-files-demo/blob/master/.github/workflows/release-please.yml
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ steps.release.outputs.pr }}
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          fetch-depth: 0
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}

      - name: Configure Git user
        if: ${{ steps.release.outputs.pr }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git --no-pager show --name-only

      - name: Format CHANGELOG.md
        if: ${{ steps.release.outputs.pr }}
        run: npx oxfmt CHANGELOG.md .release-please-manifest.json

      - name: Commit
        if: ${{ steps.release.outputs.pr }}
        run: |
          git add CHANGELOG.md .release-please-manifest.json
          git commit -m 'chore: Format CHANGELOG.md' --no-verify

      - name: Push changes
        if: ${{ steps.release.outputs.pr }}
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
        with:
          github_token: ${{ secrets.RELEASE_PR_TOKEN }}
          branch: ${{ fromJson(steps.release.outputs.pr).headBranchName }}

  package:
    name: Package Safari
    runs-on: macos-latest
    needs: [release-pr]
    if: ${{ (github.event_name == 'pull_request' || needs.release-pr.outputs.release_created == 'true') && always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Setup build environment
        uses: ./.github/actions/setup-browser-extension

      - name: Build Safari app
        run: pnpm safari:build-app

      - name: Archive Safari app
        run: |
          cd dist/safari
          ditto -c -k --keepParent "JabRef Browser Extension.app" "JabRef Browser Extension.app.zip"

      - name: Upload Safari project artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: safari-project
          path: dist/safari

      - name: Upload Safari app artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: safari-unsigned-app
          path: dist/safari/JabRef Browser Extension.app.zip

      - name: Setup macOS key chain
        if: ${{ github.event_name != 'pull_request' }}
        uses: slidoapp/import-codesign-certs@1923310662e8682dd05b76b612b53301f431cd5d
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: tEmPoRaRY-PaeSWD

      - name: Setup macOS key chain for app id cert
        if: ${{ github.event_name != 'pull_request' }}
        uses: slidoapp/import-codesign-certs@1923310662e8682dd05b76b612b53301f431cd5d
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          create-keychain: false
          keychain-password: tEmPoRaRY-PaeSWD

      - name: Sign Safari app for direct distribution
        if: ${{ github.event_name != 'pull_request' }}
        env:
          IDENTITY: ${{ secrets.SAFARI_DEVELOPER_ID_SIGNING_IDENTITY }}
        run: pnpm sign:safari-local

      - name: Upload signed Safari app artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: safari-signed-app
          path: dist/safari/JabRef Browser Extension.app

  notarize-safari:
    name: Notarize Safari
    runs-on: macos-latest
    needs: [release-pr, package]
    if: ${{ github.event_name != 'pull_request' && needs.release-pr.outputs.release_created == 'true' }}
    steps:
      - name: Download signed Safari app artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v5.0.0
        with:
          name: safari-signed-app
          path: dist/safari

      - name: Notarize Safari app for direct distribution
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          app_path='dist/safari/JabRef Browser Extension.app'
          archive_path='dist/safari/JabRef Browser Extension.zip'
          final_zip='dist/safari/jabref-browser-extension-safari.zip'
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

          echo "$APPLE_API_KEY" | base64 --decode > "$key_path"
          chmod 600 "$key_path"

          codesign -vvv --deep --strict "$app_path"
          rm -f "$archive_path" "$final_zip"
          ditto -c -k --keepParent "$app_path" "$archive_path"

          xcrun notarytool submit "$archive_path" \
            --key "$key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          xcrun stapler staple "$app_path"
          ditto -c -k --keepParent "$app_path" "$final_zip"

      - name: Upload signed Safari distribution artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: safari-signed-distribution
          path: dist/safari/jabref-browser-extension-safari.zip

  publish:
    name: Publish (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    needs: [release-pr, package, notarize-safari]
    if: ${{ (github.event_name == 'pull_request' || needs.release-pr.outputs.release_created == 'true') && always() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: browser-stores
            runs-on: ubuntu-latest
          - target: safari
            runs-on: macos-26
          - target: safari-distribution
            runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: ${{ matrix.target == 'browser-stores' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Setup build environment
        if: ${{ matrix.target == 'browser-stores' }}
        uses: ./.github/actions/setup-browser-extension

      - name: Build browser store packages
        if: ${{ matrix.target == 'browser-stores' }}
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Checkout
        if: ${{ matrix.target == 'safari' && github.event_name != 'pull_request' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Setup build environment
        if: ${{ matrix.target == 'safari' && github.event_name != 'pull_request' }}
        uses: ./.github/actions/setup-browser-extension

      - name: Download signed Safari distribution artifact
        if: ${{ matrix.target == 'safari-distribution' && github.event_name != 'pull_request' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v5.0.0
        with:
          name: safari-signed-distribution
          path: dist/safari

      - name: Submit to Firefox Add-ons
        if: ${{ matrix.target == 'browser-stores' }}
        run: |
          pnpm wxt submit \
            ${{ github.event_name == 'pull_request' && '--dry-run' || '' }} \
            --firefox-zip .output/*-firefox.zip --firefox-sources-zip .output/*-sources.zip

        #--chrome-zip .output/*-chrome.zip \
        #--edge-zip .output/{your-extension}-{version}-chrome.zip
        env:
          #CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          #CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          #CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          #CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_EXTENSION_ID: "@jabfox"
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Build Safari app
        if: ${{ matrix.target == 'safari' && github.event_name != 'pull_request' }}
        run: pnpm safari:build-app

      - name: Upload Safari to App Store Connect
        if: ${{ matrix.target == 'safari' && github.event_name != 'pull_request' }}
        uses: rxliuli/safari-webext-publish-action@624701331ecbeb38464a09d3cac6d246b6efb006
        with:
          project-path: "dist/safari"
          bundle-identifier: "org.jabref.JabRef-Browser-Extension"
          team-id: ${{ secrets.APPLE_TEAM_ID }}
          app-signing-identity: ${{ secrets.SAFARI_APP_SIGNING_IDENTITY }}
          installer-signing-identity: ${{ secrets.SAFARI_INSTALLER_SIGNING_IDENTITY }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_MACOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_MACOS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_MACOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Publish Safari distribution artifact
        if: ${{ matrix.target == 'safari-distribution' && github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-pr.outputs.tag_name }}" dist/safari/jabref-browser-extension-safari.zip --clobber
